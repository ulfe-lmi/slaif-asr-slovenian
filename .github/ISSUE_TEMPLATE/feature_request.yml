name: Feature proposal
description: Propose a bounded change to the project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    attributes:
      label: Domain problem
      description: Describe the real user or research need, not only an implementation idea.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed outcome
    validations:
      required: true
  - type: textarea
    attributes:
      label: Non-goals
      description: What should this proposal explicitly not include?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Acceptance evidence
      description: Which tests or measurements would prove success?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Architecture and license impact
  - type: dropdown
    attributes:
      label: Requires an ADR?
      options:
        - "Yes"
        - "No"
        - "Unsure"
    validations:
      required: true
