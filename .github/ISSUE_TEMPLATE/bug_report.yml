name: Bug report
description: Report a reproducible defect in code, configuration, or documentation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    attributes:
      label: Safety check
      options:
        - label: This issue contains no credentials, private speech, private transcripts, or unpublished dataset locations.
          required: true
  - type: textarea
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Include commands, revisions, and a minimal privacy-safe example.
    validations:
      required: true
  - type: input
    attributes:
      label: Repository commit
    validations:
      required: true
  - type: input
    attributes:
      label: Base model and revision
  - type: input
    attributes:
      label: NeMo revision
  - type: textarea
    attributes:
      label: Environment
      description: GPU, CUDA, PyTorch, Python, precision, and OS.
  - type: textarea
    attributes:
      label: Additional evidence
