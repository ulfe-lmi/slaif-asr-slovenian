name: CPU CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  cpu-checks:
    name: CPU repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # actions/setup-python v5.6.0
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install repository package
        run: |
          .venv/bin/python -m pip install --upgrade pip setuptools wheel
          .venv/bin/python -m pip install -e .

      - name: Run unit tests
        run: .venv/bin/python -m unittest discover -s tests

      - name: Compile tracked Python files
        run: .venv/bin/python -m py_compile $(git ls-files '*.py')

      - name: Validate repository hygiene
        run: .venv/bin/python scripts/check_repository.py

      - name: Check shell syntax
        run: bash -n scripts/*.sh

      - name: Check Git whitespace
        run: git diff --check
